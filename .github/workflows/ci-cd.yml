name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Choose deploy for the selected ref or rollback to redeploy an older ref."
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      git_ref:
        description: "Branch, tag, or commit SHA to deploy. Use an older SHA for rollback."
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: supplychain-ai-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend workspace dependencies
        run: UV_CACHE_DIR=/tmp/uv-cache uv sync --all-packages

      - name: Run backend tests
        run: UV_CACHE_DIR=/tmp/uv-cache uv run --package supplychain-api python -m unittest discover backend/tests

      - name: Run deterministic evaluation
        run: UV_CACHE_DIR=/tmp/uv-cache uv run --package supplychain-api python scripts/evaluate_project.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_YWRlcXVhdGUtY29uZG9yLTg1LmNsZXJrLmFjY291bnRzLmRldiQ' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  deploy:
    name: Deploy To AWS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}

      - name: Deploy selected ref
        env:
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}
          PROJECT_NAME: supplychain-ai
          DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME || 'supplychain-ai-workspaces' }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          CLERK_ISSUER: ${{ secrets.CLERK_ISSUER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5-nano' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          ALARM_EMAIL: ${{ secrets.ALARM_EMAIL }}
        run: bash scripts/deploy_aws.sh
